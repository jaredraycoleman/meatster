name: Keepalive

# GitHub auto-disables scheduled workflows after 60 days of repo inactivity.
# This workflow pushes a no-op commit every two weeks so update-data.yml
# keeps running.

on:
  schedule:
    - cron: '0 12 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Touch keepalive file and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
          git add .github/keepalive.txt
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: keepalive [skip ci]"
          git push
